# Default experiment configuration — v3 §6.1 per-fold pipeline.
# Runs all baselines + linear + tree models across 5 folds × 3 leads.
# Climatology and persistence are always included even if absent from `models`
# (they're required as references for the MSSS skill scores).
#
# Search backends:
#   - Linear models use grid_search (small spaces, exhaustive is cheap).
#   - RF / XGBoost use Optuna (TPE) with n_trials=40 per (fold, lead). With
#     108 / 144 grid combos otherwise, Optuna cuts ~2.7×/3.6× of tree cost.
# RF n_estimators trimmed to [200, 500] (dropping 1000 saves ~40% per-trial
# cost with no meaningful gain in best-HP quality on Morocco-scale data).
# Combined Optuna + trim drops the expected wall time from ~60-80h to ~15h.

name: default

# Persist fitted models so post-hoc scripts (post-hoc importance, refit-train
# RMSE for Fig 8b) can load them via the fast path instead of refitting.
# Adds ~1-3 GB of joblib files under `output.models_dir`.
save_models: true

# Leads to forecast (months).
leads: [1, 3, 6]

# Modeling unit (§7.2): "global" (v1 default) | "per_cell" (sensitivity).
modeling_unit: global

# Models to run. Each must be in droughtmodel.models.registry.REGISTRY and
# have a matching configs/models/<name>.yaml for default params.
models:
  - climatology
  - persistence
  - ar
  - ols
  - ridge
  - lasso
  - elasticnet
  - rf
  - xgboost

# Search backend per model. Models not listed default to "grid".
search_backends:
  rf: optuna
  xgboost: optuna

# Optuna budget per (fold × lead) for each model. Only consulted when
# search_backends[model] == "optuna"; ignored for grid-backed models.
optuna_n_trials:
  rf: 40
  xgboost: 40

# HP grids per model — v3 §8 search spaces.
# For grid-backed models these are the exhaustive combinations.
# For Optuna-backed models (rf, xgboost) these define the categorical
# distributions Optuna samples from.
# Models without an entry here are fit directly on the contiguous refit slice
# with the defaults from configs/models/<name>.yaml (no tuning).
hp_grids:
  ridge:
    alpha: [1.0e-3, 3.16e-3, 1.0e-2, 3.16e-2, 1.0e-1, 3.16e-1, 1.0, 3.16, 10.0, 31.6, 100.0, 316.0, 1000.0]
    # ↑ logspace(-3, 3, 13)
  lasso:
    alpha: [1.0e-3, 3.16e-3, 1.0e-2, 3.16e-2, 1.0e-1, 3.16e-1, 1.0, 3.16, 10.0, 31.6, 100.0, 316.0, 1000.0]
  elasticnet:
    alpha: [1.0e-3, 1.0e-2, 1.0e-1, 1.0, 10.0, 100.0, 1000.0]
    # ↑ logspace(-3, 3, 7)
    l1_ratio: [0.1, 0.3, 0.5, 0.7, 0.9]
  rf:
    n_estimators: [200, 500]                # TRIMMED (was [200, 500, 1000])
    max_depth: [null, 5, 10, 20]
    min_samples_leaf: [1, 5, 20]
    max_features: ["sqrt", 0.5, 1.0]
    # Optuna categorical space size = 2·4·3·3 = 72; n_trials=40 → 1.8× under-sampling
  xgboost:
    max_depth: [4, 6, 8]
    learning_rate: [0.05, 0.1]
    subsample: [0.7, 1.0]
    colsample_bytree: [0.7, 1.0]
    reg_lambda: [0.1, 1.0, 10.0]
    min_child_weight: [1, 5]
    # Optuna categorical space size = 3·2·2·2·3·2 = 144; n_trials=40 → 3.6× under-sampling

# Output paths (relative to project root unless absolute).
output:
  predictions_dir: results/predictions
  metrics_dir: results/metrics
  logs_dir: results/logs
  models_dir: results/models
