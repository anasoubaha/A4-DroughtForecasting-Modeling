# Default experiment configuration — v3 §6.1 per-fold pipeline.
# Runs all baselines + linear + tree models across 5 folds × 3 leads.
# Climatology and persistence are always included even if absent from `models`
# (they're required as references for the MSSS skill scores).

name: default

# Leads to forecast (months).
leads: [1, 3, 6]

# Modeling unit (§7.2): "global" (v1 default) | "per_cell" (sensitivity).
modeling_unit: global

# Models to run. Each must be in droughtmodel.models.registry.REGISTRY and
# have a matching configs/models/<name>.yaml for default params.
models:
  - climatology
  - persistence
  - ar
  - ols
  - ridge
  - lasso
  - elasticnet
  - rf
  - xgboost

# HP grids per model — v3 §8 search spaces.
# Models without an entry here are fit directly on the contiguous refit slice
# with the defaults from configs/models/<name>.yaml (no tuning).
hp_grids:
  ridge:
    alpha: [1.0e-3, 3.16e-3, 1.0e-2, 3.16e-2, 1.0e-1, 3.16e-1, 1.0, 3.16, 10.0, 31.6, 100.0, 316.0, 1000.0]
    # ↑ logspace(-3, 3, 13)
  lasso:
    alpha: [1.0e-3, 3.16e-3, 1.0e-2, 3.16e-2, 1.0e-1, 3.16e-1, 1.0, 3.16, 10.0, 31.6, 100.0, 316.0, 1000.0]
  elasticnet:
    alpha: [1.0e-3, 1.0e-2, 1.0e-1, 1.0, 10.0, 100.0, 1000.0]
    # ↑ logspace(-3, 3, 7)
    l1_ratio: [0.1, 0.3, 0.5, 0.7, 0.9]
  rf:
    n_estimators: [200, 500, 1000]
    max_depth: [null, 5, 10, 20]
    min_samples_leaf: [1, 5, 20]
    max_features: ["sqrt", 0.5, 1.0]
  xgboost:
    max_depth: [4, 6, 8]
    learning_rate: [0.05, 0.1]
    subsample: [0.7, 1.0]
    colsample_bytree: [0.7, 1.0]
    reg_lambda: [0.1, 1.0, 10.0]
    min_child_weight: [1, 5]

# Output paths (relative to project root unless absolute).
output:
  predictions_dir: results/predictions
  metrics_dir: results/metrics
  logs_dir: results/logs
