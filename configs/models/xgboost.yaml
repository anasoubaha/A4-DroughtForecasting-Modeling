# XGBoost regressor.
# All Section-3 features pass through; no pre-filter (trees handle redundancy).
# n_estimators is determined by early stopping on val (v3 §8).
# v3 §7.1.

name: xgboost
class: xgboost
params:
  max_depth: 6
  learning_rate: 0.1
  subsample: 1.0
  colsample_bytree: 1.0
  reg_lambda: 1.0
  min_child_weight: 1
  n_estimators: 2000          # upper cap; early stopping picks actual rounds
  early_stopping_rounds: 50
  eval_metric: rmse
  tree_method: hist           # fast default
  n_jobs: -1
  random_state: 42

# HP search grid (v3 §8 — reduced from full v2 draft to 144 combos):
#   max_depth        ∈ {4, 6, 8}
#   learning_rate    ∈ {0.05, 0.1}
#   subsample        ∈ {0.7, 1.0}
#   colsample_bytree ∈ {0.7, 1.0}
#   reg_lambda       ∈ {0.1, 1.0, 10.0}
#   min_child_weight ∈ {1, 5}
#   → 144 combos; n_estimators via early stopping
