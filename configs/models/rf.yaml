# Random Forest regressor.
# All Section-3 features pass through; no pre-filter (trees handle redundancy).
# v3 §7.1.

name: rf
class: rf
params:
  n_estimators: 500
  max_depth: null         # null = unlimited
  min_samples_leaf: 1
  max_features: sqrt      # "sqrt" | 0.5 | 1.0
  n_jobs: -1
  random_state: 42

# HP search grid (v3 §8):
#   n_estimators     ∈ {200, 500, 1000}
#   max_depth        ∈ {null, 5, 10, 20}
#   min_samples_leaf ∈ {1, 5, 20}
#   max_features     ∈ {sqrt, 0.5, 1.0}
#   → 108 combos
