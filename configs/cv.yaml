# Cross-validation configuration (v3 §4 + §4.1).
# 5-fold rolling-origin, expanding train window, continuous test windows
# (2000-01 → 2024-12 unbroken), with adaptive boundary-gap quarantine.

# Planned fold boundaries (test_end is inclusive). `train_start` is the same for
# all folds (expanding window). The quarantine (boundary gap) is applied to the
# END of train and the END of val before the indices are returned to the model.
folds:
  - {train_start: "1950-01", val_start: "1992-01", test_start: "2000-01", test_end: "2004-12"}
  - {train_start: "1950-01", val_start: "1997-01", test_start: "2005-01", test_end: "2009-12"}
  - {train_start: "1950-01", val_start: "2002-01", test_start: "2010-01", test_end: "2014-12"}
  - {train_start: "1950-01", val_start: "2007-01", test_start: "2015-01", test_end: "2019-12"}
  - {train_start: "1950-01", val_start: "2012-01", test_start: "2020-01", test_end: "2024-12"}

# Boundary gap (months) applied at end of train and end of val to prevent
# lag-feature leakage. If `null`, the gap is set per-fold to the maximum
# selected lag from PACF / CCF. If a positive integer, that fixed value is used
# for every fold (e.g. set to 12 for a conservative "worst-case" quarantine).
boundary_gap_months: null

# Pre-standardized exception list — variables NOT re-standardized fold-wise.
# Their lagged versions (suffix `_lag{k}`) are also excluded automatically.
# Per v3 §5: ENSO/NAO/MO are pre-standardized by their providers; SPEI3 is in
# z-score units by construction; `target` is SPEI3 shifted forward by the lead.
standardization_exceptions:
  - enso
  - nao
  - mo
  - spei3
  - target
