# Feature engineering configuration. See droughtmodel/features.py.

# Contemporary (time-t) predictors. Each gets included as a feature directly.
contemporary_predictors:
  - precip
  - tmin
  - tmax
  - pet
  - vpd
  - wind
  - solar
  - tcwv
  - rzsm
  - enso
  - nao
  - mo
  - spei3

# Long-memory variables: tested for lags 1..12 via PACF + CCF.
long_memory_vars:
  - spei3
  - rzsm
  - enso
  - nao
  - mo
  - tcwv
  - precip
  - vpd

# Fast-response variables: tested for lag 1 only.
fast_response_vars:
  - tmin
  - tmax
  - solar
  - wind

# PACF lag selection (auto-correlation within a variable).
pacf:
  n_lags: 12
  threshold: 0.20
  sensitivity_thresholds: [0.10, 0.30]   # tested in appendix

# CCF cross-variable lag screening (predictor → SPEI3).
ccf:
  target: spei3
  max_lag: 12
  threshold: 0.20
  winter_only: true             # restrict CCF target months to Nov-Feb (our evaluation season)

# Region mask for spatial aggregation during PACF/CCF.
# When set, lag selection uses only cells inside the shapefile.
# Leave `path: null` to use the full grid.
region_mask:
  path: shapefiles/MAR_adm0.shp
  name: morocco

# Aggregation mode for gridded variables when computing the lag spectra.
#   spatial_mean        — mask → spatial mean → one 1-D series → PACF/CCF (approach A)
#   per_cell_then_mean  — per-cell PACF/CCF, then average across mask cells (approach B)
aggregation_mode: spatial_mean

# Encoding switches.
include_seasonal_encoding: true   # sin/cos of month-of-year
include_spatial_encoding: true    # lat, lon as features (global-model approach)

# Lead times for which to construct datasets.
leads: [1, 3, 6]

# Output cache (per-lead full feature datasets).
cache_dir: data/interim
cache_format: zarr

# Cell selected for PACF/CCF diagnostics (one representative point).
# The headline lag selection uses spatially-averaged series; this cell is shown alongside
# for context in the diagnostics notebook.
diagnostic_cell:
  lat: 31.5   # Marrakech-ish
  lon: -8.0
